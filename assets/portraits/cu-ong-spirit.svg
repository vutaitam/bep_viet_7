<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Cụ Ông (linh hồn) — dõi theo cháu, kết thúc xúc động</title>
  <defs>
    <!-- Twilight gradient background -->
    <linearGradient id="bg-spirit" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFE5A8"/>
      <stop offset="40%" stop-color="#FFD0A0"/>
      <stop offset="80%" stop-color="#FFC4C0"/>
      <stop offset="100%" stop-color="#E8A8B8"/>
    </linearGradient>
    <!-- Outer halo (large, soft) -->
    <radialGradient id="halo-outer" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#FFE082" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#FFD54F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>
    <!-- Inner halo (tight, bright) -->
    <radialGradient id="halo-inner" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FFEB99" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE082" stop-opacity="0"/>
    </radialGradient>
    <!-- Body fade — more dramatic -->
    <linearGradient id="fade-body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="75%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="90%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade-cardigan" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#C8B68C" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#C8B68C" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#C8B68C" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#C8B68C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C8B68C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade-skin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E5C9A0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E5C9A0" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="mist" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE5A8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFE5A8" stop-opacity="0"/>
    </radialGradient>
    <!-- Wisp gradient (curling spirit trails) -->
    <linearGradient id="wisp" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Light beam from above -->
    <linearGradient id="beam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Hoa văn cloud subtle -->
    <pattern id="hoa-van-spirit" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 28 Q14 20 28 28 T56 28" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.35"/>
      <circle cx="28" cy="14" r="0.8" fill="#FFFFFF" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Twilight sky background -->
  <rect width="256" height="256" fill="url(#bg-spirit)"/>
  <!-- Subtle hoa văn cloud overlay -->
  <rect width="256" height="256" fill="url(#hoa-van-spirit)" opacity="0.5"/>

  <!-- Light beams from above (3 layers) -->
  <g opacity="0.45">
    <path d="M128 0 L70 256 L186 256 Z" fill="url(#beam)" opacity="0.5"/>
    <path d="M128 0 L90 256 L166 256 Z" fill="url(#beam)" opacity="0.7"/>
    <path d="M128 0 L110 256 L146 256 Z" fill="url(#beam)" opacity="0.9"/>
  </g>

  <!-- Soft cloud bands -->
  <ellipse cx="60" cy="80" rx="55" ry="7" fill="#FFFFFF" opacity="0.18"/>
  <ellipse cx="200" cy="100" rx="65" ry="9" fill="#FFFFFF" opacity="0.14"/>
  <ellipse cx="180" cy="60" rx="42" ry="6" fill="#FFFFFF" opacity="0.2"/>
  <ellipse cx="40" cy="120" rx="35" ry="5" fill="#FFFFFF" opacity="0.15"/>

  <!-- OUTER halo (large soft) -->
  <circle cx="128" cy="108" r="115" fill="url(#halo-outer)"/>
  <!-- INNER halo (tight bright behind head) -->
  <circle cx="128" cy="100" r="55" fill="url(#halo-inner)"/>

  <!-- Wisp trails curling around figure -->
  <g opacity="0.6">
    <path d="M60 220 Q70 200 85 195 Q100 190 100 175 Q95 165 80 165" stroke="url(#wisp)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M196 220 Q186 200 171 195 Q156 190 156 175 Q161 165 176 165" stroke="url(#wisp)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M40 200 Q55 180 70 175" stroke="url(#wisp)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M216 200 Q201 180 186 175" stroke="url(#wisp)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Sparkle dots (more, larger) -->
  <g fill="#FFD700" opacity="0.9">
    <circle cx="55" cy="70" r="1.8"/><circle cx="200" cy="55" r="2.2"/>
    <circle cx="220" cy="120" r="1.4"/><circle cx="40" cy="130" r="2"/>
    <circle cx="65" cy="180" r="1.5"/><circle cx="195" cy="195" r="1.7"/>
    <circle cx="170" cy="40" r="1.2"/><circle cx="90" cy="40" r="1.4"/>
    <circle cx="225" cy="170" r="1.7"/><circle cx="35" cy="200" r="1.5"/>
    <circle cx="50" cy="50" r="1"/><circle cx="210" cy="80" r="1.3"/>
    <circle cx="155" cy="220" r="1.2"/><circle cx="100" cy="220" r="1.3"/>
  </g>
  <!-- 4-pointed sparkles (twinkle) -->
  <g fill="#FFFFFF">
    <path d="M100 50 l1.2 4.5 l4.5 1.2 l-4.5 1.2 l-1.2 4.5 l-1.2 -4.5 l-4.5 -1.2 l4.5 -1.2z" opacity="0.95"/>
    <path d="M180 130 l1.2 5.5 l5.5 1.2 l-5.5 1.2 l-1.2 5.5 l-1.2 -5.5 l-5.5 -1.2 l5.5 -1.2z" opacity="0.9"/>
    <path d="M70 165 l1 3.5 l3.5 1 l-3.5 1 l-1 3.5 l-1 -3.5 l-3.5 -1 l3.5 -1z" opacity="0.85"/>
    <path d="M195 100 l0.8 3 l3 0.8 l-3 0.8 l-0.8 3 l-0.8 -3 l-3 -0.8 l3 -0.8z" opacity="0.8"/>
    <path d="M50 110 l0.9 3 l3 0.9 l-3 0.9 l-0.9 3 l-0.9 -3 l-3 -0.9 l3 -0.9z" opacity="0.85"/>
  </g>

  <!-- Mist trails at base of figure (denser) -->
  <ellipse cx="128" cy="245" rx="90" ry="22" fill="url(#mist)"/>
  <ellipse cx="100" cy="232" rx="42" ry="14" fill="url(#mist)" opacity="0.7"/>
  <ellipse cx="160" cy="235" rx="42" ry="14" fill="url(#mist)" opacity="0.7"/>
  <ellipse cx="80" cy="240" rx="30" ry="10" fill="url(#mist)" opacity="0.5"/>
  <ellipse cx="180" cy="242" rx="30" ry="10" fill="url(#mist)" opacity="0.5"/>

  <!-- ===== SPIRIT FIGURE (semi-transparent, fades to mist) ===== -->
  <g opacity="0.92">
    <!-- Cardigan / shoulders, fading dramatically -->
    <path d="M68 220 L70 175 Q72 160 95 154 L161 154 Q184 160 186 175 L188 220 Q188 248 128 252 Q68 248 68 220 Z"
          fill="url(#fade-cardigan)" stroke="#A8956C" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- V-neck collar -->
    <path d="M104 154 L128 178 L152 154" fill="none" stroke="#A8956C" stroke-width="1.2" opacity="0.5"/>

    <!-- Shirt under cardigan (translucent) -->
    <path d="M110 156 L110 185 L146 185 L146 156 Z" fill="#FFFFFF" opacity="0.55"/>

    <!-- BLESSING HANDS raised at chest, palms outward (more articulated) -->
    <!-- Left hand -->
    <g opacity="0.88">
      <path d="M88 200 Q82 195 80 188 Q80 178 87 176 Q94 176 98 184 L102 192 L100 208 Z" fill="url(#fade-skin)" stroke="#A8855E" stroke-width="0.7" stroke-opacity="0.6"/>
      <!-- Palm crease -->
      <path d="M86 192 q5 -2 10 0" stroke="#A8855E" stroke-width="0.4" fill="none" opacity="0.5"/>
      <!-- Fingers -->
      <line x1="86" y1="186" x2="85" y2="178" stroke="#A8855E" stroke-width="0.7" opacity="0.7"/>
      <line x1="91" y1="183" x2="91" y2="174" stroke="#A8855E" stroke-width="0.7" opacity="0.7"/>
      <line x1="96" y1="184" x2="98" y2="176" stroke="#A8855E" stroke-width="0.7" opacity="0.7"/>
      <!-- Thumb -->
      <path d="M82 190 q-3 -2 -3 -6" stroke="#A8855E" stroke-width="0.7" fill="none" opacity="0.7"/>
    </g>
    <!-- Right hand -->
    <g opacity="0.88">
      <path d="M168 200 Q174 195 176 188 Q176 178 169 176 Q162 176 158 184 L154 192 L156 208 Z" fill="url(#fade-skin)" stroke="#A8855E" stroke-width="0.7" stroke-opacity="0.6"/>
      <path d="M160 192 q5 -2 10 0" stroke="#A8855E" stroke-width="0.4" fill="none" opacity="0.5"/>
      <line x1="170" y1="186" x2="171" y2="178" stroke="#A8855E" stroke-width="0.7" opacity="0.7"/>
      <line x1="165" y1="183" x2="165" y2="174" stroke="#A8855E" stroke-width="0.7" opacity="0.7"/>
      <line x1="160" y1="184" x2="158" y2="176" stroke="#A8855E" stroke-width="0.7" opacity="0.7"/>
      <path d="M174 190 q3 -2 3 -6" stroke="#A8855E" stroke-width="0.7" fill="none" opacity="0.7"/>
    </g>

    <!-- Neck -->
    <path d="M118 154 L118 144 Q118 136 128 135 Q138 136 138 144 L138 154 Z" fill="url(#fade-skin)" stroke="#A8855E" stroke-width="0.8" stroke-opacity="0.6"/>

    <!-- Head -->
    <path d="M92 92 Q92 67 128 62 Q164 67 164 92 L164 124 Q164 144 128 146 Q92 144 92 124 Z" fill="url(#fade-skin)" stroke="#A8855E" stroke-width="1.2" stroke-opacity="0.7"/>
    <!-- Cheek hollows (older spirit) -->
    <ellipse cx="100" cy="120" rx="6" ry="9" fill="#9F744A" opacity="0.18"/>
    <ellipse cx="156" cy="120" rx="6" ry="9" fill="#9F744A" opacity="0.18"/>
    <!-- White hair -->
    <path d="M88 90 Q86 62 110 58 Q128 55 146 58 Q170 62 168 90 L164 90 Q164 66 145 62 Q128 60 111 62 Q92 66 92 90 Z" fill="#FFFFFF" opacity="0.96"/>
    <!-- Hair strands -->
    <path d="M105 60 q-2 -4 0 -6" stroke="#E8E5DC" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M118 56 q1 -3 2 -5" stroke="#E8E5DC" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M138 56 q-1 -3 -2 -5" stroke="#E8E5DC" stroke-width="0.5" fill="none" opacity="0.7"/>
    <path d="M151 60 q2 -4 0 -6" stroke="#E8E5DC" stroke-width="0.5" fill="none" opacity="0.7"/>
    <ellipse cx="128" cy="70" rx="14" ry="4" fill="#E5C9A0" opacity="0.4"/>
    <!-- White beard with strand texture -->
    <path d="M106 132 Q110 152 128 158 Q146 152 150 132 Q148 144 130 146 Q108 144 106 132 Z" fill="#FFFFFF" opacity="0.92"/>
    <g stroke="#E0DDD0" stroke-width="0.4" fill="none" opacity="0.8">
      <path d="M112 140 q-1 5 -1 10"/>
      <path d="M118 144 q0 4 -1 8"/>
      <path d="M128 146 q0 4 0 9"/>
      <path d="M138 144 q-1 4 0 8"/>
      <path d="M144 140 q1 5 1 10"/>
    </g>
    <!-- Mustache -->
    <path d="M116 126 Q128 130 140 126 Q137 132 128 132 Q119 132 116 126 Z" fill="#FFFFFF" opacity="0.92"/>
    <!-- Ears (slightly visible) -->
    <ellipse cx="90" cy="108" rx="3" ry="6" fill="url(#fade-skin)" stroke="#A8855E" stroke-width="0.5" stroke-opacity="0.5"/>
    <ellipse cx="166" cy="108" rx="3" ry="6" fill="url(#fade-skin)" stroke="#A8855E" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Eyes (warm proud, slightly open, watching) -->
    <g>
      <path d="M104 107 q7 -3 14 0" stroke="#3E2723" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85"/>
      <ellipse cx="111" cy="106" rx="2" ry="1.2" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="111" cy="106" r="0.8" fill="#3E2723" opacity="0.85"/>
      <!-- Twinkle in eye -->
      <circle cx="112" cy="105" r="0.3" fill="#FFFFFF"/>

      <path d="M138 107 q7 -3 14 0" stroke="#3E2723" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85"/>
      <ellipse cx="145" cy="106" rx="2" ry="1.2" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="145" cy="106" r="0.8" fill="#3E2723" opacity="0.85"/>
      <circle cx="146" cy="105" r="0.3" fill="#FFFFFF"/>
    </g>
    <!-- Eyebrows white drooping -->
    <path d="M100 98 Q105 96 116 98 Q116 100 113 102" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.95"/>
    <path d="M140 98 Q140 100 143 102 M143 102 Q151 96 159 98" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.95"/>
    <!-- Crow's feet -->
    <path d="M97 108 q-3 2 -5 4" stroke="#A8855E" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M97 113 q-4 1 -6 1" stroke="#A8855E" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M159 108 q3 2 5 4" stroke="#A8855E" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M159 113 q4 1 6 1" stroke="#A8855E" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <!-- Nose -->
    <path d="M128 112 q-2 7 -1 12 q1 1 2 0" fill="none" stroke="#A8855E" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Peaceful proud smile -->
    <path d="M120 137 Q128 141 136 137" stroke="#5D2F1A" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Forehead lines -->
    <path d="M106 78 q22 -2 44 0" stroke="#A8855E" stroke-width="0.5" fill="none" opacity="0.45"/>
    <path d="M108 83 q20 -1 40 0" stroke="#A8855E" stroke-width="0.4" fill="none" opacity="0.35"/>
    <!-- Signature mole on right cheek -->
    <circle cx="159" cy="120" r="0.8" fill="#5D2F1A" opacity="0.7"/>
  </g>

  <!-- Final foreground sparkle near figure (small accent) -->
  <g fill="#FFFFFF" opacity="0.9">
    <circle cx="120" cy="170" r="0.8"/>
    <circle cx="140" cy="172" r="0.7"/>
    <circle cx="105" cy="180" r="0.6"/>
    <circle cx="155" cy="178" r="0.7"/>
  </g>
</svg>
