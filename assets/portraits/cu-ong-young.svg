<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Cụ Ông (45 tuổi) — đang nấu, khởi đầu tâm huyết</title>
  <defs>
    <radialGradient id="bg-young" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F1E0B5"/>
    </radialGradient>
    <linearGradient id="apron-young" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#E8D9B8"/>
    </linearGradient>
    <radialGradient id="steam-young" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheek-blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A87C56" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A87C56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin-shade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B98A5C"/>
    </linearGradient>
    <pattern id="hoa-van" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0 24 Q12 14 24 24 T48 24" fill="none" stroke="#A87C56" stroke-width="0.8" opacity="0.3"/>
      <path d="M0 36 Q12 26 24 36 T48 36" fill="none" stroke="#A87C56" stroke-width="0.6" opacity="0.2"/>
      <circle cx="24" cy="12" r="0.8" fill="#C62828" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg-young)"/>
  <!-- Hoa văn (Vietnamese wave pattern) overlay 8% -->
  <rect width="256" height="256" fill="url(#hoa-van)" opacity="0.5"/>

  <!-- Lantern accent top-left (60% opacity) with glow -->
  <g opacity="0.6" transform="translate(28,28)">
    <circle cx="10" cy="14" r="14" fill="#FFD700" opacity="0.15"/>
    <line x1="10" y1="0" x2="10" y2="6" stroke="#7B4F2E" stroke-width="1.2"/>
    <ellipse cx="10" cy="14" rx="8" ry="9" fill="#C62828" stroke="#8E0E00" stroke-width="1"/>
    <line x1="10" y1="6" x2="10" y2="22" stroke="#7B4F2E" stroke-width="0.6" opacity="0.4"/>
    <path d="M10 23l-2 6h4z" fill="#FFD700"/>
    <!-- Lantern fold lines -->
    <path d="M3 14 q7 -4 14 0" stroke="#8E0E00" stroke-width="0.5" fill="none" opacity="0.6"/>
    <path d="M3 14 q7 4 14 0" stroke="#8E0E00" stroke-width="0.5" fill="none" opacity="0.6"/>
  </g>
  <!-- Bamboo leaf cluster top-right -->
  <g opacity="0.55" transform="translate(212,28)">
    <path d="M0 6 q-8 -10 -22 -8 q14 4 22 12z" fill="#7CB342"/>
    <path d="M-4 14 q-8 -8 -20 -4 q12 4 20 8z" fill="#558B2F"/>
    <path d="M2 0 q-2 -8 -8 -10 q4 6 6 12z" fill="#7CB342" opacity="0.7"/>
    <line x1="0" y1="6" x2="-22" y2="-2" stroke="#558B2F" stroke-width="0.5"/>
  </g>

  <!-- ===== BODY ===== -->
  <!-- Apron back -->
  <path d="M50 246 L50 175 Q50 155 80 150 L176 150 Q206 155 206 175 L206 246 Z" fill="url(#apron-young)" stroke="#C9B58E" stroke-width="1.5"/>
  <!-- Apron strings hanging -->
  <line x1="76" y1="152" x2="74" y2="170" stroke="#A89066" stroke-width="1.2" opacity="0.6"/>
  <line x1="180" y1="152" x2="182" y2="170" stroke="#A89066" stroke-width="1.2" opacity="0.6"/>
  <!-- Stains on apron -->
  <ellipse cx="100" cy="200" rx="6" ry="3" fill="#7B4F2E" opacity="0.18" transform="rotate(-15 100 200)"/>
  <ellipse cx="160" cy="215" rx="5" ry="2.5" fill="#7B4F2E" opacity="0.16" transform="rotate(20 160 215)"/>
  <ellipse cx="135" cy="225" rx="4" ry="2" fill="#5D2F1A" opacity="0.12"/>
  <!-- White shirt collar -->
  <path d="M95 152 L128 168 L161 152 L161 145 Q156 138 128 138 Q100 138 95 145 Z" fill="#FFFFFF" stroke="#D4C8A0" stroke-width="1"/>
  <!-- Collar fold detail -->
  <path d="M105 145 L128 165" stroke="#D4C8A0" stroke-width="0.5" opacity="0.6"/>
  <path d="M151 145 L128 165" stroke="#D4C8A0" stroke-width="0.5" opacity="0.6"/>
  <!-- Neck -->
  <path d="M115 140 L115 132 Q115 125 128 124 Q141 125 141 132 L141 140 Z" fill="#D4A574" stroke="#A87C56" stroke-width="0.8"/>
  <!-- Adam's apple hint -->
  <path d="M125 132 q3 2 6 0" fill="none" stroke="#A87C56" stroke-width="0.6" opacity="0.5"/>

  <!-- Bowl with bún dọc mùng held at chest -->
  <g transform="translate(0,4)">
    <!-- Steam (3 swirls) more organic -->
    <path d="M115 165 Q108 158 112 148 Q120 142 116 132 Q110 130 115 122" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M128 165 Q132 155 126 145 Q134 138 130 128 Q124 122 130 116" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M141 165 Q148 158 144 148 Q136 142 140 132 Q146 130 141 122" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <ellipse cx="115" cy="155" rx="6" ry="11" fill="url(#steam-young)"/>
    <ellipse cx="128" cy="148" rx="7" ry="13" fill="url(#steam-young)"/>
    <ellipse cx="142" cy="155" rx="6" ry="11" fill="url(#steam-young)"/>
    <!-- Bowl shadow -->
    <ellipse cx="128" cy="222" rx="42" ry="3" fill="#3E2723" opacity="0.15"/>
    <!-- Bowl body -->
    <ellipse cx="128" cy="195" rx="40" ry="8" fill="#F5F5F5"/>
    <path d="M88 195 Q88 220 128 222 Q168 220 168 195 Z" fill="#FFFFFF" stroke="#888" stroke-width="1.2"/>
    <!-- Bowl underside shading -->
    <path d="M93 210 Q128 218 163 210" fill="none" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <!-- Bowl rim with blue lotus motif (more detailed) -->
    <ellipse cx="128" cy="195" rx="40" ry="6" fill="none" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Lotus pattern dots + petals -->
    <g fill="#1565C0">
      <circle cx="100" cy="195" r="2.2"/>
      <path d="M95 195 q5 -3 10 0 q-5 3 -10 0" opacity="0.8"/>
      <circle cx="118" cy="193" r="2"/>
      <path d="M114 193 q4 -3 8 0 q-4 3 -8 0" opacity="0.8"/>
      <circle cx="138" cy="193" r="2"/>
      <path d="M134 193 q4 -3 8 0 q-4 3 -8 0" opacity="0.8"/>
      <circle cx="156" cy="195" r="2.2"/>
      <path d="M151 195 q5 -3 10 0 q-5 3 -10 0" opacity="0.8"/>
    </g>
    <!-- Soup contents -->
    <ellipse cx="128" cy="194" rx="35" ry="4" fill="#E8B66C" opacity="0.7"/>
    <!-- Dọc mùng (green leaves) -->
    <ellipse cx="115" cy="192" rx="6" ry="2" fill="#7CB342" transform="rotate(-15 115 192)"/>
    <ellipse cx="138" cy="193" rx="5" ry="2" fill="#558B2F" transform="rotate(20 138 193)"/>
    <ellipse cx="148" cy="192" rx="3" ry="1.5" fill="#7CB342"/>
    <!-- Tomato slice (red) -->
    <circle cx="125" cy="194" r="3" fill="#C62828"/>
    <circle cx="125" cy="194" r="1.5" fill="#FF8A65" opacity="0.5"/>
    <!-- Pork rib -->
    <ellipse cx="142" cy="194" rx="4" ry="2" fill="#8D5524"/>
    <ellipse cx="142" cy="194" rx="2" ry="1" fill="#5D2F1A" opacity="0.5"/>
  </g>
  <!-- Hands holding bowl (with knuckle hint) -->
  <g>
    <ellipse cx="92" cy="200" rx="9" ry="6" fill="#D4A574" stroke="#A87C56" stroke-width="0.8"/>
    <line x1="86" y1="200" x2="98" y2="200" stroke="#A87C56" stroke-width="0.5" opacity="0.5"/>
    <line x1="88" y1="197" x2="96" y2="197" stroke="#A87C56" stroke-width="0.4" opacity="0.4"/>
    <ellipse cx="164" cy="200" rx="9" ry="6" fill="#D4A574" stroke="#A87C56" stroke-width="0.8"/>
    <line x1="158" y1="200" x2="170" y2="200" stroke="#A87C56" stroke-width="0.5" opacity="0.5"/>
    <line x1="160" y1="197" x2="168" y2="197" stroke="#A87C56" stroke-width="0.4" opacity="0.4"/>
  </g>
  <!-- Sleeves -->
  <path d="M50 175 Q40 180 36 195 L36 220 Q40 235 50 240 L70 240 Q80 235 82 215 L82 178 Z" fill="#FFFFFF" stroke="#D4C8A0" stroke-width="1.2"/>
  <path d="M206 175 Q216 180 220 195 L220 220 Q216 235 206 240 L186 240 Q176 235 174 215 L174 178 Z" fill="#FFFFFF" stroke="#D4C8A0" stroke-width="1.2"/>
  <!-- Sleeve fold lines -->
  <path d="M44 200 q4 -2 8 0" stroke="#D4C8A0" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M212 200 q-4 -2 -8 0" stroke="#D4C8A0" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- ===== HEAD (more angular jaw) ===== -->
  <!-- Jaw shadow -->
  <path d="M88 92 Q86 70 110 60 Q128 56 146 60 Q170 70 168 92 L168 116 Q166 138 128 144 Q90 138 88 116 Z" fill="url(#skin-shade)" stroke="#A87C56" stroke-width="1.4"/>
  <!-- Cheek shading (subtle blush) -->
  <ellipse cx="103" cy="115" rx="8" ry="6" fill="url(#cheek-blush)"/>
  <ellipse cx="153" cy="115" rx="8" ry="6" fill="url(#cheek-blush)"/>
  <!-- Cheekbone highlights -->
  <path d="M97 102 Q100 108 103 112" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M159 102 Q156 108 153 112" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Jaw definition lines -->
  <path d="M92 122 Q98 132 110 138" stroke="#A87C56" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M164 122 Q158 132 146 138" stroke="#A87C56" stroke-width="0.7" fill="none" opacity="0.5"/>
  <!-- Hair (black with strand texture) -->
  <path d="M82 90 Q78 58 105 51 Q128 48 151 51 Q178 58 174 90 L168 88 Q168 64 145 60 Q128 58 111 60 Q88 64 88 88 Z" fill="#1B1B1B"/>
  <!-- Hair strands -->
  <path d="M105 55 q-2 -5 0 -8" stroke="#0a0a0a" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M118 50 q1 -4 3 -7" stroke="#0a0a0a" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M138 50 q-1 -4 -3 -7" stroke="#0a0a0a" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M151 55 q2 -5 0 -8" stroke="#0a0a0a" stroke-width="0.8" fill="none" opacity="0.7"/>
  <!-- Hair edge over forehead (irregular) -->
  <path d="M95 80 Q103 76 108 80 Q115 75 122 79 Q128 73 134 79 Q141 75 148 80 Q153 76 161 80" stroke="#0a0a0a" stroke-width="1" fill="none" opacity="0.85"/>
  <!-- Grey temple streaks (more visible) -->
  <path d="M84 78 Q86 68 95 65" fill="none" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M86 85 Q90 75 99 71" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M172 78 Q170 68 161 65" fill="none" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M170 85 Q166 75 157 71" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Ears (subtle) -->
  <ellipse cx="86" cy="105" rx="3" ry="6" fill="#C49066" stroke="#8B6440" stroke-width="0.6"/>
  <ellipse cx="170" cy="105" rx="3" ry="6" fill="#C49066" stroke="#8B6440" stroke-width="0.6"/>
  <path d="M86 104 q1 3 0 6" stroke="#8B6440" stroke-width="0.4" fill="none"/>
  <path d="M170 104 q-1 3 0 6" stroke="#8B6440" stroke-width="0.4" fill="none"/>

  <!-- Eyes (almond shape, more character) -->
  <g>
    <path d="M100 100 q4 -3 14 -2 q3 4 -2 6 q-7 1 -12 -4z" fill="#FFFFFF" stroke="#3E2723" stroke-width="0.8"/>
    <ellipse cx="108" cy="101" rx="2.5" ry="2" fill="#3E2723"/>
    <circle cx="109" cy="100" r="0.6" fill="#FFFFFF"/>
    <path d="M142 100 q4 -3 14 -2 q3 4 -2 6 q-7 1 -12 -4z" fill="#FFFFFF" stroke="#3E2723" stroke-width="0.8"/>
    <ellipse cx="150" cy="101" rx="2.5" ry="2" fill="#3E2723"/>
    <circle cx="151" cy="100" r="0.6" fill="#FFFFFF"/>
    <!-- Crow's feet -->
    <path d="M99 102 q-3 1 -5 3" stroke="#A87C56" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <path d="M99 105 q-3 0 -5 1" stroke="#A87C56" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <path d="M157 102 q3 1 5 3" stroke="#A87C56" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <path d="M157 105 q3 0 5 1" stroke="#A87C56" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <!-- Lower eyelid line -->
    <path d="M101 105 q7 2 13 0" stroke="#A87C56" stroke-width="0.5" fill="none" opacity="0.6"/>
    <path d="M143 105 q7 2 13 0" stroke="#A87C56" stroke-width="0.5" fill="none" opacity="0.6"/>
  </g>
  <!-- Eyebrows (more expressive — slight downward outer arch = warm gentle) -->
  <path d="M97 91 Q103 88 113 90 Q116 92 116 94" stroke="#1B1B1B" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M140 94 Q140 92 143 90 Q153 88 159 91" stroke="#1B1B1B" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Brow texture hairs -->
  <path d="M101 89 v2" stroke="#0a0a0a" stroke-width="0.5"/>
  <path d="M107 88 v2" stroke="#0a0a0a" stroke-width="0.5"/>
  <path d="M155 89 v2" stroke="#0a0a0a" stroke-width="0.5"/>
  <path d="M149 88 v2" stroke="#0a0a0a" stroke-width="0.5"/>
  <!-- Nose (with more shape) -->
  <path d="M128 105 q-3 8 -2 14 q1 2 4 1 q3 -1 4 -2 q1 -2 -1 -3 q-2 -8 -5 -10z" fill="#C49066" stroke="#A87C56" stroke-width="0.8" opacity="0.4"/>
  <path d="M125 116 q3 1 6 0" stroke="#A87C56" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <!-- Mouth — small genuine half-smile (asymmetric for natural feel) -->
  <path d="M118 124 Q124 128 132 127 Q138 126 140 123" stroke="#5D2F1A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Smile crease -->
  <path d="M114 126 q-2 1 -3 3" stroke="#A87C56" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M142 125 q2 1 3 3" stroke="#A87C56" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Stubble (denser, slight asymmetric pattern) -->
  <g fill="#1B1B1B" opacity="0.5">
    <circle cx="111" cy="130" r="0.7"/><circle cx="116" cy="132" r="0.6"/>
    <circle cx="121" cy="133" r="0.7"/><circle cx="126" cy="134" r="0.7"/>
    <circle cx="131" cy="134" r="0.7"/><circle cx="136" cy="133" r="0.6"/>
    <circle cx="141" cy="132" r="0.7"/><circle cx="146" cy="130" r="0.6"/>
    <circle cx="115" cy="135" r="0.6"/><circle cx="120" cy="137" r="0.5"/>
    <circle cx="124" cy="138" r="0.5"/><circle cx="129" cy="138" r="0.6"/>
    <circle cx="134" cy="138" r="0.5"/><circle cx="139" cy="137" r="0.5"/>
    <circle cx="144" cy="135" r="0.6"/>
    <circle cx="118" cy="141" r="0.4"/><circle cx="124" cy="142" r="0.4"/>
    <circle cx="132" cy="142" r="0.4"/><circle cx="138" cy="141" r="0.4"/>
  </g>
  <!-- Forehead lines (subtle 2 lines) -->
  <path d="M104 76 q24 -2 48 0" stroke="#A87C56" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M108 81 q20 -1 40 0" stroke="#A87C56" stroke-width="0.4" fill="none" opacity="0.35"/>

  <!-- Distinguishing feature: small mole on right cheek (signature mark) -->
  <circle cx="158" cy="118" r="0.9" fill="#5D2F1A"/>
</svg>
